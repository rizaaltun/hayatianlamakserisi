<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangi Kitap Sana Göre? | Hayatı Anlamak Serisi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f7; --bg2: #f3f0ec; --white: #ffffff;
            --border: #e8e3dc; --text: #1a1714; --muted: #7a7269;
            --accent: #5b8dd9; --accent-light: #e8eef8; --accent2: #3a6bc4; --ink: #2d2926;
        }
        #bg-synapse {
            position:fixed; top:0; left:0;
            width:100%; height:100%;
            pointer-events:none; z-index:0;
        }
        .wrapper, nav { position:relative; z-index:1; }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

        nav {
            height:64px; display:flex; align-items:center;
            justify-content:space-between; padding:0 2.5rem;
            background:var(--white); border-bottom:1px solid var(--border);
            position:sticky; top:0; z-index:50;
        }
        .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .nav-logo-mark {
            width:34px; height:34px; background:var(--ink); border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-family:'Lora',serif; font-size:18px; font-weight:700;
        }
        .nav-logo-text { font-family:'Lora',serif; font-size:15px; font-weight:700; color:var(--ink); }
        .nav-back {
            font-size:13px; font-weight:500; color:var(--muted); text-decoration:none;
            display:flex; align-items:center; gap:6px; transition:color 0.2s;
        }
        .nav-back:hover { color:#5b8dd9; }
        .nav-back::before { content:'←'; }

        .wrapper { max-width:760px; margin:0 auto; padding:4rem 2rem 6rem; }

        .intro { text-align:center; margin-bottom:3.5rem; animation:fadeUp 0.6s ease both; }
        .intro-label {
            display:inline-flex; align-items:center; gap:8px;
            background:var(--accent-light); color:var(--accent);
            font-size:11.5px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
            padding:5px 14px; border-radius:100px; margin-bottom:1.5rem;
        }
        .intro-label::before { content:''; width:6px; height:6px; background:#5b8dd9; border-radius:50%; }
        .intro h1 {
            font-family:'Lora',serif; font-size:clamp(2rem,5vw,3rem); font-weight:700;
            color:var(--ink); line-height:1.2; letter-spacing:-0.02em; margin-bottom:1rem;
        }
        .intro h1 em { font-style:italic; color:var(--accent); }
        .intro p { font-size:15.5px; font-weight:300; color:var(--muted); line-height:1.75; max-width:500px; margin:0 auto; }

        .progress-wrap { margin-bottom:2.5rem; animation:fadeUp 0.6s 0.1s ease both; opacity:0; }
        .progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .progress-label { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
        .progress-count { font-family:'Lora',serif; font-size:13px; color:var(--accent); font-weight:600; }
        .progress-bar { height:4px; background:var(--border); border-radius:100px; overflow:hidden; }
        .progress-fill {
            height:100%; background:linear-gradient(90deg, #5b8dd9, #3a6bc4);
            border-radius:100px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%;
        }


        /* ── GÜZEL SORU TASARIMI ── */

        /* Progress adım göstergesi */
        .progress-steps {
            display:flex; justify-content:center; gap:8px;
            margin-bottom:2rem; animation:fadeUp 0.6s 0.1s ease both; opacity:0;
        }
        .step-dot {
            width:10px; height:10px; border-radius:50%;
            background:var(--border); transition:all 0.4s ease;
        }
        .step-dot.active { background:#5b8dd9; width:26px; border-radius:5px; transform:scaleY(1.2); }
        .step-dot.done { background:#5b8dd9; opacity:0.35; }

        /* Soru kartı */
        .question-card {
            background:var(--white); border:1.5px solid var(--border);
            border-radius:28px; padding:3rem; margin-bottom:1.5rem;
            animation:slideIn 0.38s cubic-bezier(0.25,0.46,0.45,0.94) both;
            box-shadow:0 8px 32px rgba(0,0,0,0.04);
        }
        @keyframes slideIn {
            from { opacity:0; transform:translateX(40px); }
            to   { opacity:1; transform:translateX(0); }
        }
        @keyframes popIn {
            0%   { transform:scale(0.95); opacity:0; }
            70%  { transform:scale(1.02); }
            100% { transform:scale(1); opacity:1; }
        }
        .question-num {
            font-size:11px; font-weight:700; color:#5b8dd9;
            letter-spacing:0.18em; text-transform:uppercase;
            margin-bottom:1.2rem; display:flex; align-items:center; gap:8px;
        }
        .question-num::before {
            content:''; display:inline-block;
            width:24px; height:2px; background:#5b8dd9; border-radius:2px;
        }
        .question-text {
            font-family:'Lora',serif; font-size:1.25rem; font-weight:600;
            color:var(--ink); line-height:1.6; margin-bottom:2rem;
        }

        /* Seçenekler */
        .options { display:flex; flex-direction:column; gap:10px; }
        .option {
            display:flex; align-items:center; gap:16px;
            padding:16px 20px;
            border:1.5px solid var(--border); border-radius:16px;
            cursor:pointer; transition:all 0.22s ease;
            background:var(--bg); text-align:left; width:100%;
            font-family:'DM Sans',sans-serif; position:relative; overflow:hidden;
        }
        .option::before {
            content:''; position:absolute; inset:0;
            background:rgba(91,141,217,0.06);
            opacity:0; transition:opacity 0.2s;
        }
        .option:hover { border-color:#5b8dd9; transform:translateX(5px); background:rgba(91,141,217,0.04); }
        .option:hover::before { opacity:1; }
        .option.selected {
            border-color:#5b8dd9; background:rgba(91,141,217,0.08);
            transform:translateX(5px);
            box-shadow:0 4px 18px rgba(91,141,217,0.18);
            animation:popIn 0.28s ease both;
        }
        .option-letter {
            width:32px; height:32px; border-radius:10px;
            background:var(--border); flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:11px; font-weight:700; color:var(--muted);
            transition:all 0.25s; letter-spacing:0.05em;
        }
        .option:hover .option-letter,
        .option.selected .option-letter {
            background:#5b8dd9; color:white;
            transform:scale(1.12);
        }
        .option-text { font-size:14.5px; font-weight:400; color:var(--text); line-height:1.55; }

        /* İleri butonu */
        .next-btn {
            margin-top:1.75rem; width:100%; padding:16px;
            background:var(--ink); color:white; border:none; border-radius:16px;
            font-family:'DM Sans',sans-serif; font-size:14.5px; font-weight:600;
            cursor:pointer; transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
            display:none; letter-spacing:0.03em;
        }
        .next-btn.visible { display:block; animation:fadeUp 0.3s ease both; }
        .next-btn:hover { background:#5b8dd9; transform:translateY(-2px); box-shadow:0 8px 24px rgba(91,141,217,0.28); }


                .result-card {
            display:none; background:var(--white); border:1.5px solid var(--border);
            border-radius:24px; overflow:hidden; animation:fadeUp 0.6s ease both;
        }
        .result-card.visible { display:block; }
        .result-header {
            background:linear-gradient(135deg, #e8eef8, #eef2fb);
            padding:2.5rem; text-align:center; border-bottom:1.5px solid var(--border);
        }
        .result-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:var(--accent); color:white; font-size:11px; font-weight:700;
            letter-spacing:0.15em; text-transform:uppercase;
            padding:5px 14px; border-radius:100px; margin-bottom:1.25rem;
        }
        .result-title { font-family:'Lora',serif; font-size:1rem; font-style:italic; color:var(--muted); margin-bottom:0.5rem; }
        .result-book-name {
            font-family:'Lora',serif; font-size:1.7rem; font-weight:700;
            color:var(--ink); line-height:1.25; letter-spacing:-0.02em;
        }
        .result-body { display:flex; gap:2rem; padding:2rem 2.5rem; align-items:flex-start; }
        .result-cover {
            width:130px; flex-shrink:0; object-fit:contain;
            filter:drop-shadow(0 6px 16px rgba(0,0,0,0.1)); transition:transform 0.3s;
        }
        .result-cover:hover { transform:scale(1.04) translateY(-4px); }
        .result-info { flex:1; }
        .result-author { font-size:12px; font-weight:600; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:0.75rem; }
        .result-desc { font-size:14px; font-weight:300; color:var(--muted); line-height:1.8; margin-bottom:1.5rem; }
        .result-actions { display:flex; gap:10px; flex-wrap:wrap; }
        .btn-amazon {
            display:inline-flex; align-items:center; gap:7px;
            font-size:13px; font-weight:600; color:white; background:var(--ink);
            padding:10px 20px; border-radius:100px; text-decoration:none;
            transition:background 0.2s, transform 0.15s;
        }
        .btn-amazon::after { content:'↗'; font-size:12px; }
        .btn-amazon:hover { background:#5b8dd9; transform:translateY(-1px); }
        .btn-retry {
            display:inline-flex; align-items:center; gap:7px;
            font-size:13px; font-weight:600; color:var(--muted); background:var(--bg2);
            border:1.5px solid var(--border); padding:10px 20px; border-radius:100px;
            cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s;
        }
        .btn-retry:hover { border-color:#5b8dd9; color:#5b8dd9; background:#e8eef8; }
        .result-footer {
            padding:1.5rem 2.5rem; border-top:1px solid var(--border);
            background:var(--bg); text-align:center;
        }
        .result-footer p { font-size:12px; color:var(--muted); line-height:1.7; }
        .result-footer a { color:#5b8dd9; text-decoration:none; font-weight:500; }
        .result-footer a:hover { text-decoration:underline; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        .fade-in { animation:fadeIn 0.4s ease both; }
    </style>
</head>
<body>
<canvas id="bg-synapse"></canvas>
<nav>
    <a href="#" class="nav-logo">
        <div class="nav-logo-text">Hayatı Anlamak Serisi</div>
    </a>
    <a href="index.html" class="nav-back">Ana Sayfaya Dön</a>
</nav>

<div class="wrapper">
    <div class="intro">
        <div class="intro-label">Kısa Test</div>
        <h1>Hangi kitap <em>sana göre?</em></h1>
        <p>10 kısa soruyu yanıtla, zihninin hangi köşesine dokunduğumuzu birlikte keşfedelim.</p>
    </div>
    <div class="progress-wrap" id="progressWrap">
        <div class="progress-top">
            <span class="progress-label">İlerleme</span>
            <span class="progress-count" id="progressCount">Soru 1 / 10</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div id="questionArea"></div>
    <div class="result-card" id="resultCard"></div>
</div>

<script>
// ── SORU HAVUZU ──
// Her soru hangi kitaba kaç puan verdiğini scores objesiyle taşır.
// k1=Depresyon, k2=SosyalFobi, k3=YemeBoz, k4=Temizlik(OKB), k5=Takıntı, k6=EminOlmak

const allQuestions = [

  // ── DEPRESYON (k1) ──
  {
    text: "Sabahları yataktan kalkmak nasıl geçiyor?",
    options: [
      { text: "Bazen çok zor, o gün için bir anlam bulmak güçleşiyor.", scores: {k1:3} },
      { text: "Gün içinde yaşayacaklarım aklımda dolanır, endişe ederim.", scores: {k2:2, k1:1} },
      { text: "Genel olarak iyiyim ama bazı sabahlar ağır geçiyor.", scores: {k1:1, k3:1} },
      { text: "Rutin bozulunca stresleniyorum.", scores: {k4:2, k5:1} }
    ]
  },
  {
    text: "Eskiden keyif aldığın şeylere şimdi ne kadar ilgi duyuyorsun?",
    options: [
      { text: "Çoğuna ilgim azaldı, zevk almak güçleşti.", scores: {k1:3} },
      { text: "İlgim var ama sosyal kısım beni engelliyor.", scores: {k2:2, k1:1} },
      { text: "İlgim var; yeme ve beden konuları kafamı meşgul ediyor.", scores: {k3:2} },
      { text: "İlgim var ama aklım başka yerde, düşünceler kapıyor.", scores: {k5:2, k6:1} }
    ]
  },
  {
    text: "Geçmişe bakıp kendini nasıl değerlendirirsin?",
    options: [
      { text: "Pek çok şey yanlış gitmiş, düşünmek ağırlaştırıyor.", scores: {k1:3} },
      { text: "Yaptıklarımı çok sorguluyor, 'keşke farklı olsaydı' diyorum.", scores: {k6:2, k1:1} },
      { text: "Bazı anılar ya da düşünceler aklımdan gitmiyor.", scores: {k5:2, k4:1} },
      { text: "Genel olarak barışığım, küçük şeyler var ama büyük değil.", scores: {k3:1, k2:1} }
    ]
  },
  {
    text: "Gelecek hakkında ne düşünürsün?",
    options: [
      { text: "Çoğu zaman umutsuz veya belirsiz geliyor.", scores: {k1:3} },
      { text: "Sosyal ve iş hayatımda nasıl görüneceğim konusunda kaygılanırım.", scores: {k2:2, k1:1} },
      { text: "Yanlış karar vereceğimden çok endişelenirim.", scores: {k6:2, k1:1} },
      { text: "Genel olarak iyimserim ama zihnimde dönen düşünceler var.", scores: {k5:1, k4:1} }
    ]
  },
  {
    text: "Sevdiklerinle birlikteyken aklın nerede olur?",
    options: [
      { text: "Orada olduğumu hissettiremiyorum, içim başka yerde.", scores: {k1:3} },
      { text: "Nasıl göründüğümü ya da ne söylediğimi düşünüyorum.", scores: {k2:3} },
      { text: "Aklım sürekli bir şeyleri çözmeye çalışıyor.", scores: {k5:2, k6:1} },
      { text: "Genellikle o anda varım ama zaman zaman dağılıyorum.", scores: {k4:1, k3:1} }
    ]
  },

  // ── SOSYAL FOBİ (k2) ──
  {
    text: "Bir sosyal ortama girmeden önce ne hissedersin?",
    options: [
      { text: "Çok gerilirim, insanların ne düşüneceğini merak ederim.", scores: {k2:3} },
      { text: "Zaman zaman geride kalır, kendimi çekmek isterim.", scores: {k2:2, k1:1} },
      { text: "Heyecanlanırım ama çok da sorun yaratmaz.", scores: {k1:1} },
      { text: "Ortam benim için değil; yanlış bir şey söylerim diye korkarım.", scores: {k2:2, k6:1} }
    ]
  },
  {
    text: "Sana bakıldığında insanların ne düşündüğünü merak eder misin?",
    options: [
      { text: "Çok fazla merak ederim, bu beni yorar.", scores: {k2:3} },
      { text: "Bazen fark ederim ama hayatımı domine etmiyor.", scores: {k2:1, k6:1} },
      { text: "Daha çok ne yaptığımı ve yapıp yapamayacağımı sorgularım.", scores: {k5:2, k6:1} },
      { text: "Çok umursamam genellikle.", scores: {k1:1, k3:1} }
    ]
  },
  {
    text: "Topluluk önünde bir şeyler yapmak (sunum, konuşma vb.) denince ne hissedersin?",
    options: [
      { text: "Paniklerim, mümkün olsa hiç yapmak istemezdim.", scores: {k2:3} },
      { text: "Kaygılanırım ama bir şekilde hallederim.", scores: {k2:1, k6:1} },
      { text: "Kötü yaparım diye endişeleniyorum ama daha büyük sorunum var.", scores: {k1:1, k5:1} },
      { text: "Beni çok zorlamıyor.", scores: {k3:1, k4:1} }
    ]
  },
  {
    text: "Sosyal bir ortamda hata yapınca ne olur?",
    options: [
      { text: "Saatlerce, bazen günlerce aklımdan çıkmaz.", scores: {k2:3} },
      { text: "Kafama takılır ama fazla uzatmam.", scores: {k2:1, k6:1} },
      { text: "Zaten gitmeyi çok sevmediğim için bu pek olmaz.", scores: {k1:1} },
      { text: "Bir dahaki seferde doğru yapmak için kontrol ederim.", scores: {k6:2, k4:1} }
    ]
  },

  // ── YEME BOZUKLUĞU (k3) ──
  {
    text: "Yemek konusu zihninde ne kadar yer kaplıyor?",
    options: [
      { text: "Çok fazla — ne yedim, ne yiyeceğim, ne yemeli ne yememeliydim.", scores: {k3:3} },
      { text: "Bazen farkında olmadan çok yiyorum ya da hiç yemiyorum.", scores: {k3:2, k1:1} },
      { text: "Yemek değil, başka düşünceler kafamı meşgul ediyor.", scores: {k5:2, k6:1} },
      { text: "Fazla bir sorunum yok bu konuda.", scores: {k2:1, k1:1} }
    ]
  },
  {
    text: "Bedenin hakkında nasıl hissediyorsun?",
    options: [
      { text: "Bedenimle barışık değilim, bu beni çok mutsuz ediyor.", scores: {k3:3} },
      { text: "Bazen kendimle dalga geçerim ama büyük sorun değil.", scores: {k3:1, k1:1} },
      { text: "Bedenimi değil zihnimde dönen şeyleri kontrol etmekte zorlanıyorum.", scores: {k5:2, k4:1} },
      { text: "Kendimi yeterince kabul ediyorum.", scores: {k2:1, k6:1} }
    ]
  },
  {
    text: "Duygusal yoğunluk yaşadığında yeme davranışın nasıl değişir?",
    options: [
      { text: "Ya çok yerim ya da hiç yiyemem, dengem bozulur.", scores: {k3:3} },
      { text: "Sosyal ortamlardan kaçarım, yemek ikincil kalır.", scores: {k2:2} },
      { text: "Kendimi düşüncelere kapatırım, yemek aklıma bile gelmez.", scores: {k5:2, k6:1} },
      { text: "Ruh halimden bağımsız, ritüellerim bozulunca rahatsız olurum.", scores: {k4:2, k1:1} }
    ]
  },

  // ── TEMİZLİK/KİRLENME OKB (k4) ──
  {
    text: "Temizlik ya da kirlenme konusunda kendini nasıl tanımlarsın?",
    options: [
      { text: "Temizlik beni çok endişelendirir, yeterli olmadığını hissederim.", scores: {k4:3} },
      { text: "Belirli ritüellerim var, bunları yapmadan rahat edemem.", scores: {k4:2, k5:1} },
      { text: "Düzenli olmayı severim ama saplantı değil.", scores: {k5:1, k6:1} },
      { text: "Bu alanda büyük bir sorunum yok.", scores: {k1:1, k2:1} }
    ]
  },
  {
    text: "Dışarıdan eve geldiğinde ya da birine dokunduğunda ne hissedersin?",
    options: [
      { text: "Hemen temizlenmem gerektiğini, yoksa bir şeyler olacağını hissederim.", scores: {k4:3} },
      { text: "Genellikle normal ama aklıma takılan düşünceler var.", scores: {k5:2, k4:1} },
      { text: "Pek bir şey hissetmiyorum, başka konular var.", scores: {k1:2, k6:1} },
      { text: "Normal davranıyorum ama sonrasını çok düşünüyorum.", scores: {k6:2, k4:1} }
    ]
  },
  {
    text: "Bir şeyin 'yeterince temiz' olup olmadığından emin olmak için ne yaparsın?",
    options: [
      { text: "Defalarca kontrol ederim, emin olana kadar duramam.", scores: {k4:3} },
      { text: "Başkalarına sorarım, onaylanınca rahatlarım.", scores: {k6:2, k4:1} },
      { text: "Böyle bir sorunum yok ama başka alanlarda sürekli emin olmaya çalışıyorum.", scores: {k6:2, k5:1} },
      { text: "Bu konuda çok takılmıyorum.", scores: {k1:1, k2:1} }
    ]
  },

  // ── TAKINTILAR/OKB-Düşünce (k5) ──
  {
    text: "Aklından çıkmayan, içinden atamadığın bir düşünce oluyor mu?",
    options: [
      { text: "Evet, bazen gün boyu aynı düşünce döner durur.", scores: {k5:3, k4:1} },
      { text: "Daha çok gelecek hakkında kaygılanırım.", scores: {k1:2, k2:1} },
      { text: "Yaptığım ya da yapamadığım şeyler üzerinde çok düşünürüm.", scores: {k6:2, k1:1} },
      { text: "Pek öyle olmaz ama bazen kendimi aşırı eleştiririm.", scores: {k1:2, k3:1} }
    ]

const TOTAL = 10;
const letters = ['A','B','C','D'];
let questions, current, scores, selected;

// ── Her kitaptan en az 1 soru gelecek şekilde dengeli seçim ──
function pickQuestions() {
  const groups = {
    k1: allQuestions.slice(0,5),
    k2: allQuestions.slice(5,9),
    k3: allQuestions.slice(9,12),
    k4: allQuestions.slice(12,15),
    k5: allQuestions.slice(15,18),
    k6: allQuestions.slice(18,21)
  };

  const shuffle = arr => [...arr].sort(() => Math.random()-0.5);

  // Her gruptan 1 garanti
  let picked = Object.values(groups).map(g => shuffle(g)[0]);

  // Kalan 4 soruyu tüm havuzdan rastgele doldur (seçilenler hariç)
  const remaining = allQuestions.filter(q => !picked.includes(q));
  const extra = shuffle(remaining).slice(0,4);
  picked = shuffle([...picked, ...extra]);

  return picked;
}

function init() {
  questions = pickQuestions();
  current = 0;
  scores = {k1:0, k2:0, k3:0, k4:0, k5:0, k6:0};
  selected = null;
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('resultCard').innerHTML = '';
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = (current / TOTAL) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `Soru ${current+1} / ${TOTAL}`;

  // Adım noktaları
  const dots = Array.from({length:TOTAL},(_,i) => {
    let cls = 'step-dot';
    if (i < current) cls += ' done';
    else if (i === current) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  document.getElementById('questionArea').innerHTML = `
    <div class="progress-steps">${dots}</div>
    <div class="question-card">
      <div class="question-num">Soru ${current+1} / ${TOTAL}</div>
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i) => `
          <button class="option" onclick="selectOption(${i})" data-idx="${i}">
            <div class="option-letter">${letters[i]}</div>
            <div class="option-text">${o.text}</div>
          </button>
        `).join('')}
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${current < TOTAL-1 ? 'Sonraki Soru →' : 'Sonucu Gör →'}
      </button>
    </div>
  `;
  selected = null;
}

function selectOption(idx) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option')[idx].classList.add('selected');
  selected = idx;
  document.getElementById('nextBtn').classList.add('visible');
}

function nextQuestion() {
  if (selected === null) return;
  const s = questions[current].options[selected].scores;
  for (const [k,v] of Object.entries(s)) scores[k] = (scores[k]||0)+v;
  current++;
  if (current < TOTAL) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressCount').textContent = 'Tamamlandı!';
  document.getElementById('questionArea').innerHTML = '';

  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const book = books[winner];
  const card = document.getElementById('resultCard');
  card.classList.add('visible');
  card.innerHTML = `
    <div class="result-header">
      <div class="result-badge">✦ Senin için</div>
      <div class="result-title">Sana en uygun kitap:</div>
      <div class="result-book-name">${book.name}</div>
    </div>
    <div class="result-body">
      <img src="data:image/jpeg;base64,${book.img}" class="result-cover" alt="${book.name}">
      <div class="result-info">
        <div class="result-author">${book.author}</div>
        <div class="result-desc">${book.desc}</div>
        <div class="result-actions">
          <a href="${book.link}" target="_blank" class="btn-amazon">Amazon'da Satın Al</a>
          <button class="btn-retry" onclick="restartTest()">↺ Tekrar Dene</button>
        </div>
      </div>
    </div>
    <div class="result-footer">
      <p>Bu sonuç bir tanı ya da değerlendirme değildir — sadece eğlenceli bir yönlendirme.
      Tüm kitapları keşfetmek için <a href="index.html">ana sayfaya dönebilirsin.</a></p>
    </div>
  `;
  card.scrollIntoView({behavior:'smooth', block:'start'});
}

function restartTest() {
  init();
  window.scrollTo({top:0, behavior:'smooth'});
}

init();

    <script>
    (function(){
        const canvas = document.getElementById('bg-synapse');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const COL = 'rgba(91,141,217,';
        let W, H;
        function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        const NODE_COUNT = 48;
        const nodes = Array.from({length:NODE_COUNT}, ()=>({
            x:Math.random(), y:Math.random(),
            vx:(Math.random()-0.5)*0.00012, vy:(Math.random()-0.5)*0.00012,
            r:1.8+Math.random()*2.0,
            phase:Math.random()*Math.PI*2, speed:0.3+Math.random()*0.7,
        }));
        const CONNECT_DIST = 0.18;
        const signals = [];
        function spawnSignal(){
            const i=Math.floor(Math.random()*NODE_COUNT);
            const n=nodes[i]; let best=-1, bestD=999;
            nodes.forEach((m,j)=>{ if(j===i) return; const d=Math.hypot(m.x-n.x,m.y-n.y); if(d<CONNECT_DIST&&d<bestD){bestD=d;best=j;} });
            if(best<0) return;
            signals.push({from:i,to:best,t:0,speed:0.004+Math.random()*0.004});
        }
        setInterval(spawnSignal, 120);
        let mx=-1, my=-1;
        window.addEventListener('mousemove',e=>{ mx=e.clientX/window.innerWidth; my=e.clientY/window.innerHeight; });
        window.addEventListener('mouseleave',()=>{ mx=-1; my=-1; });

        let frame=0;
        function draw(){
            requestAnimationFrame(draw); frame+=0.008;
            ctx.clearRect(0,0,W,H);
            nodes.forEach(n=>{
                n.x+=n.vx; n.y+=n.vy;
                if(n.x<0||n.x>1) n.vx*=-1;
                if(n.y<0||n.y>1) n.vy*=-1;
                if(mx>=0){ const dx=n.x-mx,dy=n.y-my,d=Math.hypot(dx,dy); if(d<0.12&&d>0){const f=(0.12-d)/0.12*0.00018;n.vx+=dx/d*f;n.vy+=dy/d*f;} const spd=Math.hypot(n.vx,n.vy); if(spd>0.0004){n.vx*=0.0004/spd;n.vy*=0.0004/spd;} }
            });
            for(let i=0;i<NODE_COUNT;i++) for(let j=i+1;j<NODE_COUNT;j++){
                const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
                if(d>CONNECT_DIST) continue;
                ctx.beginPath(); ctx.moveTo(a.x*W,a.y*H); ctx.lineTo(b.x*W,b.y*H);
                ctx.strokeStyle=COL+(1-d/CONNECT_DIST)*0.22+')'; ctx.lineWidth=0.9; ctx.stroke();
            }
            for(let k=signals.length-1;k>=0;k--){
                const s=signals[k]; s.t+=s.speed; if(s.t>=1){signals.splice(k,1);continue;}
                const a=nodes[s.from],b=nodes[s.to];
                const px=(a.x+(b.x-a.x)*s.t)*W, py=(a.y+(b.y-a.y)*s.t)*H;
                const fade=Math.sin(s.t*Math.PI);
                const gr=ctx.createRadialGradient(px,py,0,px,py,5);
                gr.addColorStop(0,COL+(0.75*fade)+')'); gr.addColorStop(1,COL+'0)');
                ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
            }
            nodes.forEach(n=>{
                const pulse=0.5+0.5*Math.sin(frame*n.speed+n.phase);
                ctx.beginPath(); ctx.arc(n.x*W,n.y*H,n.r,0,Math.PI*2);
                ctx.fillStyle=COL+(0.18+pulse*0.18)+')'; ctx.fill();
            });
        }
        draw();
    })();
    </script>
</body>
</html>
